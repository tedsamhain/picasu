services:
  urocissa:
    image: hsa00000/urocissa:latest
    # To build the image from this checkout instead of pulling, comment out
    # `image:` above and uncomment the following:
    # build:
    #   context: .
    #   args:
    #     BUILD_TYPE: release
    restart: unless-stopped
    ports:
      - "5673:5673"
    environment:
      # These match the image's built-in defaults (see Dockerfile) and are
      # listed here for visibility; only change them if you also change the
      # volume targets below.
      UROCISSA_CONFIG_HOME: /config
      UROCISSA_DATA_HOME: /data
      UROCISSA_IMAGE_HOME: /images
    volumes:
      - ./urocissa-data/config:/config
      - ./urocissa-data/state:/data
      - ./urocissa-data/images:/images
