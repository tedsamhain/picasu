services:
  picasu:
    image: picasu/picasu:latest
    # To build the image from this checkout instead of pulling, comment out
    # `image:` above and uncomment the following:
    # build:
    #   context: .
    #   args:
    #     BUILD_TYPE: release
    restart: unless-stopped
    ports:
      - "5673:5673"
    environment:
      # These match the image's built-in defaults (see Dockerfile) and are
      # listed here for visibility; only change them if you also change the
      # volume targets below.
      PICASU_CONFIG_HOME: /config
      PICASU_DATA_HOME: /data
      PICASU_IMAGE_HOME: /images
    volumes:
      - ./picasu-data/config:/config
      - ./picasu-data/state:/data
      - ./picasu-data/images:/images
