name: assign_album on_conflict=skip leaves source in place when dest exists
# Verifies Group 4a: when dest already has a file with same name, skip leaves both files intact.
given:
  - dir_album: /e2e_z4/album
    id_as: $album
  - photo: /e2e_z4/album/photo.jpg
  - photo: /e2e_z4/import/photo.jpg
    id_as: $photo
when:
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album}"
      onConflict: "skip"
then:
  - response.status: 200
  - file_exists: /e2e_z4/import/photo.jpg
  - file_exists: /e2e_z4/album/photo.jpg
