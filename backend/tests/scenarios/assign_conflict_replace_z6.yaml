name: assign_album on_conflict=replace overwrites existing file at destination
# Verifies Group 4a: when dest already has photo.jpg, replace overwrites it with the source.
given:
  - dir_album: /e2e_z6/album
    id_as: $album
  - photo: /e2e_z6/album/photo.jpg
  - photo: /e2e_z6/import/photo.jpg
    id_as: $photo
when:
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album}"
      onConflict: "replace"
then:
  - response.status: 200
  # Source is gone
  - file_absent: /e2e_z6/import/photo.jpg
  # Destination has the moved file (replaced whatever was there)
  - file_exists: /e2e_z6/album/photo.jpg
