name: assign multiple files to the same album sequentially all land correctly
# Verifies batch-mode: each file is moved independently; all end up in the album dir.
given:
  - dir_album: /e2e_z8/album
    id_as: $album
  - photo: /e2e_z8/import/alpha.jpg
    id_as: $alpha
  - photo: /e2e_z8/import/beta.jpg
    id_as: $beta
  - photo: /e2e_z8/import/gamma.jpg
    id_as: $gamma
when:
  - call: PUT /put/assign_album
    body:
      hash: "${alpha}"
      albumId: "${album}"
    then:
      - response.status: 200
  - call: PUT /put/assign_album
    body:
      hash: "${beta}"
      albumId: "${album}"
    then:
      - response.status: 200
  - call: PUT /put/assign_album
    body:
      hash: "${gamma}"
      albumId: "${album}"
    then:
      - response.status: 200
then:
  - response.status: 200
  - file_exists: /e2e_z8/album/alpha.jpg
  - file_exists: /e2e_z8/album/beta.jpg
  - file_exists: /e2e_z8/album/gamma.jpg
  - file_absent: /e2e_z8/import/alpha.jpg
  - file_absent: /e2e_z8/import/beta.jpg
  - file_absent: /e2e_z8/import/gamma.jpg
