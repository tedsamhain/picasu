name: assign_album moves two independently selected albums into the same target
# Mirrors the frontend batch flow (AssignAlbumModal loops assignAlbum() once
# per selected item, sequentially) for a multi-album selection.
given:
  - dir_album: /e2e_zzb/first
    id_as: $first_album
  - photo: /e2e_zzb/first/a.jpg
  - dir_album: /e2e_zzb/second
    id_as: $second_album
  - photo: /e2e_zzb/second/b.jpg
  - dir_album: /e2e_zzb/target
    id_as: $target_album

when:
  - call: PUT /put/assign_album
    body:
      hash: "${first_album}"
      albumId: "${target_album}"
    then:
      - response.status: 200
  - call: PUT /put/assign_album
    body:
      hash: "${second_album}"
      albumId: "${target_album}"
    then:
      - response.status: 200
then:
  - response.status: 200
  - file_exists: /e2e_zzb/target/first/a.jpg
  - file_exists: /e2e_zzb/target/second/b.jpg
  - file_absent: /e2e_zzb/first/a.jpg
  - file_absent: /e2e_zzb/second/b.jpg
