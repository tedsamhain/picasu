name: album title edit writes .albuminfo.xmp sidecar
# Verifies dir-album title edits persist to a .albuminfo.xmp sidecar in the
# album's own directory, mirroring the per-photo .xmp sidecar pattern.
given:
  - dir_album: /e2e_zz4
    id_as: $album_id

when:
  - call: PUT /put/set_album_title
    raw_body: '{"albumId":"${album_id}","title":"My Custom Title"}'
then:
  - response.status: 200
  - file_exists: /e2e_zz4/.albuminfo.xmp
  - file.contains: /e2e_zz4/.albuminfo.xmp
    text: My Custom Title
