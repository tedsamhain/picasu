name: assign_album_rejects_stale_file_path
given:
  - dir_album: /e2e_j/album
    id_as: $album
  - photo: /e2e_j/photo.jpg
    id_as: $photo
  - remove: /e2e_j/photo.jpg
when:
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album}"
then:
  - response.status_not: 200
