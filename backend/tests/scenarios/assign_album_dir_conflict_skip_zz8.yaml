name: assign_album (album/directory move) on_conflict=skip leaves both directories in place when dest name collides
given:
  - dir_album: /e2e_zz8/source/child
    id_as: $child_album
  - photo: /e2e_zz8/source/child/photo.jpg
  - dir_album: /e2e_zz8/target
    id_as: $target_album
  - dir_album: /e2e_zz8/target/child
    id_as: $existing_target_child
  - photo: /e2e_zz8/target/child/other.jpg

when:
  - call: PUT /put/assign_album
    body:
      hash: "${child_album}"
      albumId: "${target_album}"
      onConflict: "skip"
    then:
      - response.status: 200
then:
  - response.status: 200
  - file_exists: /e2e_zz8/source/child/photo.jpg
  - file_exists: /e2e_zz8/target/child/other.jpg
  - file_absent: /e2e_zz8/target/child/photo.jpg
