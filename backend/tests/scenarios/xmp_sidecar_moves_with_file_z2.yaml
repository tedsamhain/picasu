name: xmp sidecar moves with file when assigned to album
# Verifies Group 3: sidecar is renamed alongside the original on assign_album.
given:
  - dir_album: /e2e_z2/album
    id_as: $album
  - photo: /e2e_z2/import/photo.jpg
    tags:
      - z2_tag
    id_as: $photo
when:
  # Capture index so we can call edit_tag
  - call: POST /get/prefetch?locate=${photo}
    capture:
      ts: response.prefetch.timestamp
      idx: response.prefetch.locateTo
  # Write a sidecar by editing the tag
  - call: PUT /put/edit_tag
    raw_body: '{"indexArray":[${idx}],"addTagsArray":["z2_tag2"],"removeTagsArray":[],"timestamp":${ts}}'
    then:
      - response.status: 200
      - file_exists: /e2e_z2/import/photo.xmp
  # Move the file to the album
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album}"
then:
  - response.status: 200
  - file_exists: /e2e_z2/album/photo.jpg
  - file_exists: /e2e_z2/album/photo.xmp
  - file_absent: /e2e_z2/import/photo.jpg
  - file_absent: /e2e_z2/import/photo.xmp
