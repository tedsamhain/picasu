name: assign_album on_conflict=rename creates renamed file when dest exists
# Verifies Group 4a: when dest already has photo.jpg, rename creates photo-001.jpg.
given:
  - dir_album: /e2e_z5/album
    id_as: $album
  - photo: /e2e_z5/album/photo.jpg
  - photo: /e2e_z5/import/photo.jpg
    id_as: $photo
when:
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album}"
      onConflict: "rename"
then:
  - response.status: 200
  - file_exists: /e2e_z5/album/photo-001.jpg
  - file_absent: /e2e_z5/import/photo.jpg
  - file_exists: /e2e_z5/album/photo.jpg
