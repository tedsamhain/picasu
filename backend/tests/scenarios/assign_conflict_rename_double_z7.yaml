name: assign_album on_conflict=rename uses next suffix when photo-001 already exists
# Verifies that find_unique_path increments: photo-001.jpg taken → photo-002.jpg chosen.
given:
  - dir_album: /e2e_z7/album
    id_as: $album
  - photo: /e2e_z7/album/photo.jpg
  - photo: /e2e_z7/album/photo-001.jpg
  - photo: /e2e_z7/import/photo.jpg
    id_as: $photo
when:
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album}"
      onConflict: "rename"
then:
  - response.status: 200
  # Source is gone
  - file_absent: /e2e_z7/import/photo.jpg
  # Original blocker files untouched
  - file_exists: /e2e_z7/album/photo.jpg
  - file_exists: /e2e_z7/album/photo-001.jpg
  # Next available suffix used
  - file_exists: /e2e_z7/album/photo-002.jpg
