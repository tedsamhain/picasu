name: assign_album moving an already-moved descendant re-extracts it as a sibling
# Documents intentional (if surprising) behavior at the API level: each
# assign_album call resolves the target's *current* dir_path fresh from the
# DB, so calling it again for an album that was already carried along by an
# earlier move of one of its own ancestors doesn't error or corrupt
# anything — it just moves the (already-relocated) album a second time,
# landing as a sibling of its former parent instead of staying nested.
# Nothing here is unsafe; the frontend (AssignAlbumModal.vue) guards
# against reaching this by skipping any selected album that is a
# descendant of another selected album in the same batch move.
given:
  - dir_album: /e2e_zzc/source
    id_as: $source_album
  - dir_album: /e2e_zzc/source/child
    id_as: $child_album
  - photo: /e2e_zzc/source/child/photo.jpg
  - dir_album: /e2e_zzc/target
    id_as: $target_album

when:
  - call: PUT /put/assign_album
    body:
      hash: "${source_album}"
      albumId: "${target_album}"
    then:
      - response.status: 200
  - call: PUT /put/assign_album
    body:
      hash: "${child_album}"
      albumId: "${target_album}"
    then:
      - response.status: 200
then:
  - response.status: 200
  - file_exists: /e2e_zzc/target/child/photo.jpg
  - file_absent: /e2e_zzc/target/source/child/photo.jpg
