name: assign_album (album/directory move) on_conflict=rename suffixes the moved directory when dest name collides
given:
  - dir_album: /e2e_zz9/source/child
    id_as: $child_album
  - photo: /e2e_zz9/source/child/photo.jpg
  - dir_album: /e2e_zz9/target
    id_as: $target_album
  - dir_album: /e2e_zz9/target/child
    id_as: $existing_target_child
  - photo: /e2e_zz9/target/child/other.jpg

when:
  - call: PUT /put/assign_album
    body:
      hash: "${child_album}"
      albumId: "${target_album}"
      onConflict: "rename"
    then:
      - response.status: 200
then:
  - response.status: 200
  # Existing directory at the destination is untouched
  - file_exists: /e2e_zz9/target/child/other.jpg
  # Moved directory landed under a renamed sibling instead of colliding
  - file_exists: /e2e_zz9/target/child-001/photo.jpg
  - file_absent: /e2e_zz9/source/child/photo.jpg
