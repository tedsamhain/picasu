[graph]
targets = []

[advisories]
version = 2
ignore = [
    # rsa Marvin Attack; pulled in by jsonwebtoken; no patched version available yet
    { id = "RUSTSEC-2023-0071", reason = "transitive dep via jsonwebtoken; no patched version available" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "NCSA",
    "OpenSSL",           # ring's custom license (see clarify block below)
    "CDLA-Permissive-2.0", # webpki-roots (TLS root certificates), via ureq v3
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
