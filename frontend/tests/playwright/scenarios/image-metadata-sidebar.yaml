name: Image metadata shown in sidebar
covers:
  api:
    - POST /post/authenticate
    - PUT /put/config
    - POST /post/index/album
    - GET /get/index/status
given:
  - config:
      password: e2e_test_pwd

  - dir_album: nature/sunset

  - photo: nature/sunset/img01.jpg
    tags: [sunset, nature, landscape, golden-hour]

steps:
  - when:
      - navigate: /login
      - fill: textbox/Password
        value: e2e_test_pwd
      - click: button/Login
    assert:
      - ui.route: /home

  - when:
      - navigate: /config
      - click: button/Scan Now
      - wait.ms: 3000
    assert:
      - ui.visible: main/

  - when:
      - navigate: /albums
    assert:
      - ui.visible: main/

  - when:
      - click.text: nature
    assert:
      - ui.visible: main/

  - when:
      - click.text: sunset
    assert:
      - ui.visible: main/

  - when:
      - click.first: true
    assert:
      - ui.visible: main/

  - when:
      - click.icon: mdi-information-outline
    assert:
      - ui.text_visible: Info
      - ui.sidebar_visible: sunset
      - ui.sidebar_visible: nature
      - ui.sidebar_visible: landscape
      - ui.sidebar_visible: golden-hour
