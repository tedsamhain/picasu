name: Initial onboarding with full index flow
covers:
  api:
    - POST /post/authenticate
    - PUT /put/config
    - POST /post/index/album
    - GET /get/index/status
given:
  - config:
      password: e2e_test_pwd

  - dir_album: nature/sunset
  - dir_album: nature/forest
  - dir_album: travel/paris
  - dir_album: travel/london
  - dir_album: pets/dogs
  - dir_album: pets/cats
  - dir_album: family/birthday
  - dir_album: family/holiday
  - dir_album: misc

  - photo: nature/sunset/img01.jpg
    tags: [sunset, nature, landscape]
  - photo: nature/sunset/img02.jpg
    tags: [sunset, nature, landscape]
  - photo: nature/forest/img01.jpg
    tags: [forest, nature]
  - photo: nature/forest/img02.jpg
    tags: [forest, nature]
  - photo: travel/paris/img01.jpg
    tags: [paris, travel, europe]
  - photo: travel/paris/img02.jpg
    tags: [paris, travel, europe]
  - photo: travel/london/img01.jpg
    tags: [london, travel, europe]
  - photo: travel/london/img02.jpg
    tags: [london, travel, europe]
  - photo: pets/dogs/img01.jpg
    tags: [dog, pets]
  - photo: pets/dogs/img02.jpg
    tags: [dog, pets]
  - photo: pets/cats/img01.jpg
    tags: [cat, pets]
  - photo: pets/cats/img02.jpg
    tags: [cat, pets]
  - photo: family/birthday/img01.jpg
    tags: [birthday, family, celebration]
  - photo: family/birthday/img02.jpg
    tags: [birthday, family, celebration]
  - photo: family/holiday/img01.jpg
    tags: [holiday, family]
  - photo: family/holiday/img02.jpg
    tags: [holiday, family]
  - photo: misc/img01.jpg
    tags: [beach, summer]
  - photo: misc/img02.jpg
    tags: [hiking, adventure]
  - photo: misc/img03.jpg
    tags: [camping, adventure]
  - photo: misc/img04.jpg
    tags: [sunset, beach]

steps:
  - when:
      - navigate: /login
      - fill: textbox/Password
        value: e2e_test_pwd
      - click: button/Login
    assert:
      - ui.route: /home

  - when:
      - navigate: /config
      - click: button/Scan Now
      - wait.ms: 3000
    assert:
      - ui.visible: main/

  - when:
      - navigate: /tags
    assert:
      - ui.visible: main/
      - ui.text: main/
        contains: sunset
      - ui.text: main/
        contains: nature

  - when:
      - navigate: /albums
    assert:
      - ui.visible: main/
      - ui.chip_visible: nature
      - ui.chip_visible: travel
      - ui.chip_visible: pets
      - ui.chip_visible: family
      - ui.chip_visible: misc
      - ui.count: .parent
        equals: 5

  - when:
      - click.text: nature
    assert:
      - ui.route: /album/
      - ui.chip_visible: sunset
      - ui.chip_visible: forest
      - ui.count: .parent
        equals: 2

  - when:
      - navigate: /albums
      - click.text: travel
    assert:
      - ui.chip_visible: paris
      - ui.chip_visible: london
      - ui.count: .parent
        equals: 2

  - when:
      - navigate: /albums
      - click.text: pets
    assert:
      - ui.chip_visible: dogs
      - ui.chip_visible: cats
      - ui.count: .parent
        equals: 2

  - when:
      - navigate: /albums
      - click.text: family
    assert:
      - ui.chip_visible: birthday
      - ui.chip_visible: holiday
      - ui.count: .parent
        equals: 2

  - when:
      - navigate: /albums
      - click.text: misc
    assert:
      - ui.visible: main/
      - ui.count: .parent
        equals: 4
