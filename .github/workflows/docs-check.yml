name: Docs check

on:
  push:
    branches: [main]
    paths:
      - "*.md"
      - "docs/**"
      - ".plan/**"
  pull_request:
    paths:
      - "*.md"
      - "docs/**"
      - ".plan/**"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: just docs-check
      - run: just plan-lint
