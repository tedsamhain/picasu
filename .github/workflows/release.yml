name: Build and Release

on:
  push:
    tags:
      - "[0-9]*"
    branches:
      - "test"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Rust Backend
        working-directory: ./backend
        run: cargo build --release --features "embed-frontend auto-open-browser"

      - name: Prepare Release Package
        run: |
          echo "Downloading FFmpeg static build..."
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz

          tar -xf ffmpeg-release-amd64-static.tar.xz

          mkdir -p final_package/picasu-linux/bin

          cp backend/target/release/picasu final_package/picasu-linux/

          cp ffmpeg-*-amd64-static/ffmpeg final_package/picasu-linux/bin/
          cp ffmpeg-*-amd64-static/ffprobe final_package/picasu-linux/bin/

          chmod +x final_package/picasu-linux/picasu
          chmod +x final_package/picasu-linux/bin/ffmpeg
          chmod +x final_package/picasu-linux/bin/ffprobe

          ./final_package/picasu-linux/bin/ffmpeg -version | head -n 1

      - name: Create Tarball
        run: |
          cd final_package

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="0.0.0"
          fi

          echo "Detected version: $VERSION"

          TAR_NAME="picasu-linux-$VERSION.tar.gz"

          tar -czf "../$TAR_NAME" picasu-linux

          echo "ASSET_PATH=$TAR_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: picasu-linux-package
          path: ${{ env.ASSET_PATH }}

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ASSET_PATH }}
