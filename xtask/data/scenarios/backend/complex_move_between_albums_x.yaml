name: complex photo moves between albums verified via api and filesystem
# Import a photo, assign it to album A (verify file moves out of import dir),
# then reassign to album B (verify file moves again), and confirm via
# get-data that the photo's listed album matches the final location.
given:
  - dir_album: /e2e_x/album_a
    id_as: $album_a
  - dir_album: /e2e_x/album_b
    id_as: $album_b
  - photo: /e2e_x/import/photo.jpg
    id_as: $photo
when:
  # Step 1: Assign photo to album A
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album_a}"
    then:
      - response.status: 200
  # Step 2: Reassign photo to album B
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album_b}"
    then:
      - response.status: 200
  # Step 3: Locate and get-data to verify album membership
  - call: POST /get/prefetch?locate=${photo}
    capture:
      token: response.token
      ts: response.prefetch.timestamp
      idx: response.prefetch.locateTo
    calc:
      end: "${idx}+1"
  - call: GET /get/get-data?timestamp=${ts}&start=${idx}&end=${end}
    auth: false
    headers:
      Authorization: "Bearer ${token}"
then:
  - response.status: 200
  - response.json.[0].abstractData.album: "${album_b}"
  # File is in album B, not album A or import
  - file_exists: /e2e_x/album_b/photo.jpg
  - file_absent: /e2e_x/album_a/photo.jpg
  - file_absent: /e2e_x/import/photo.jpg
