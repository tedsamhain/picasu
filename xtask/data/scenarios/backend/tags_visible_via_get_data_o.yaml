name: tags visible via get-data
given:
  - photo: /e2e_o/tagged.jpg
    tags:
      - e2e_o_family
      - e2e_o_vacation
    id_as: $photo
when:
  - call: POST /get/prefetch?locate=${photo}
    capture:
      token: response.token
      ts: response.prefetch.timestamp
      idx: response.prefetch.locateTo
    calc:
      end: "${idx}+1"
  - call: GET /get/get-data?timestamp=${ts}&start=${idx}&end=${end}
    auth: false
    headers:
      Authorization: "Bearer ${token}"
then:
  - response.status: 200
  - response.json.[0].abstractData.tags:
      contains: e2e_o_family
  - response.json.[0].abstractData.tags:
      contains: e2e_o_vacation
