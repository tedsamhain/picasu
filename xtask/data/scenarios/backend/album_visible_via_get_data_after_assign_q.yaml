name: album visible via get data after assign
given:
  - dir_album: /e2e_q_album
    id_as: $album
  - photo: /e2e_q_import/e2e_q_photo.jpg
    id_as: $photo
when:
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album}"
    then:
      - response.status: 200
  - call: POST /get/prefetch?locate=${photo}
    capture:
      token: response.token
      ts: response.prefetch.timestamp
      idx: response.prefetch.locateTo
    calc:
      end: "${idx}+1"
  - call: GET /get/get-data?timestamp=${ts}&start=${idx}&end=${end}
    auth: false
    headers:
      Authorization: "Bearer ${token}"
then:
  - response.status: 200
  - response.json.[0].abstractData.album: "${album}"
