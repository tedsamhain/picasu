name: Login via Enter key succeeds
covers:
  api:
    - POST /post/authenticate
    - PUT /put/config/password
  ui:
    - route:/home
given:
  - empty: true
  - config:
      password: e2e_test_pwd
when:
  - navigate: /login
  - fill: textbox/Password
    value: e2e_test_pwd
  - submit: true
then:
  - ui.route: /home
