[graph]
targets = []

[advisories]
version = 2
ignore = [
    # paste proc-macro, pulled in by rav1e (image codec); no fix available upstream
    { id = "RUSTSEC-2024-0436", reason = "transitive dep via rav1e/image; no fix available" },
    # rsa Marvin Attack; pulled in by jsonwebtoken; no patched version available yet
    { id = "RUSTSEC-2023-0071", reason = "transitive dep via jsonwebtoken; no patched version available" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
    "NCSA",
    "WTFPL",
]

# bzip2-1.0.6 is a permissive custom license (BSD-like); not an SPDX identifier
[[licenses.exceptions]]
allow = ["bzip2-1.0.6"]
name = "libbz2-rs-sys"

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
