name: assign_album moves file and updates membership
given:
  - dir_album: /gen_e2e_h_album
    id_as: $album
  - photo: /gen_e2e_h_import/gen_e2e_h_photo.jpg
    id_as: $photo
when:
  call: PUT /put/assign_album
  body:
    hash: "${photo}"
    albumId: "${album}"
then:
  - response.status: 200
  - file_exists: /gen_e2e_h_album/gen_e2e_h_photo.jpg
  - file_absent: /gen_e2e_h_import/gen_e2e_h_photo.jpg
