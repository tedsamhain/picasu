name: album membership is singular
given:
  - dir_album: /gen_e2e_i_album_a
    id_as: $album_a
  - dir_album: /gen_e2e_i_album_b
    id_as: $album_b
  - photo: /gen_e2e_i_import/gen_e2e_i_photo.jpg
    id_as: $photo
when:
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album_a}"
    then:
      - response.status: 200
  - call: PUT /put/assign_album
    body:
      hash: "${photo}"
      albumId: "${album_b}"
    then:
      - response.status: 200
then: []
